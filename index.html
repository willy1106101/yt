<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="utf-8" />
    <meta name="author" content="Willy Hsu">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Player</title>

    <meta name="description" content="一個簡單的 YouTube 播放器，支援播放列表和基本控制功能。">

    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="./manifest.json">

    <!-- jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="main_225.css">
</head>

<body>

    <div class="container py-1">

        <!-- ===================== -->
        <!-- 輸入區 -->
        <!-- ===================== -->
        <div class="mb-3">
            <input type="text" class="form-control mb-1" placeholder="貼上 YouTube 影片網址..." id="videoUrl">

            <button class="btn btn-primary" type="button" id="playBtn">
                <i class="bi bi-play-fill"></i> 播放
            </button>

            <button class="btn btn-secondary" type="button" id="pasteBtn">
                <i class="bi bi-clipboard-fill"></i> 貼上
            </button>

            <button class="btn btn-secondary" type="button" id="playDefaultBtn">
                預設影片
            </button>
        </div>

        <!-- ===================== -->
        <!-- 主體區（播放器 + playlist） -->
        <!-- ===================== -->
        <div class="row">

            <!-- 播放器 -->
            <div class="col-lg-8">
                <div id="player-wrapper" class="mb-3">
                    <div id="player" class="user-select-none"></div>
                    <div id="playerCover" class="user-select-none player-cover">
                        <!-- 可以在大圖中心加上歌曲標題的特效文字 -->
                        <div id="coverTitle" class="user-select-none player-cover-title">
                            正在播放...
                        </div>
                        <!-- 🟢 新增：中央大按鈕 -->
                        <div id="centerPlayBtn"
                            class="position-absolute top-50 start-50 translate-middle d-flex align-items-center justify-content-center"
                            style="width: 70px; height: 70px; background: rgba(0, 0, 0, 0.6); border-radius: 50%; color: white; font-size: 32px; cursor: pointer; transition: all 0.2s ease; z-index: 10;">
                            <i class="bi bi-play-fill"></i>
                        </div>
                        <!-- 🟢 新增：自訂進度條容器 -->
                        <div id="progressBarContainer" class="player-progress-bar-container">
                            <!-- 真正跑動的進度條 -->
                            <div id="progressBar" class="player-progress-bar"></div>
                        </div>
                    </div>
                </div>

                <div class="main-card p-1 border rounded">
                    <div class="row">
                        <!-- 🚀 關鍵調整：使用 w-100 (滿寬), justify-content-between (左右對齊), align-items-center (垂直置中) -->
                        <div
                            class="controls-area mb-3 d-flex w-100 justify-content-between align-items-center flex-wrap gap-3">

                            <!-- 左側控制區：放播放按鈕與速度選單 -->
                            <div class="d-flex align-items-center gap-3">
                                <button class="btn btn-secondary" id="playPauseBtn">
                                    <i class="bi bi-play-fill"></i>
                                </button>

                                <button class="btn btn-secondary" id="prevBtn">
                                    <i class="bi bi-skip-start-fill"></i>
                                </button>

                                <button class="btn btn-secondary" id="nextBtn">
                                    <i class="bi bi-skip-end-fill"></i>
                                </button>

                                <button class="btn btn-secondary" id="viewModeBtn" data-mode="video">
                                    <i class="bi bi-image"></i>
                                </button>

                                <!-- 調整美化 select 下拉選單，加入 form-select 樣式 -->
                                <select id="speedSelect"
                                    class="form-select form-select-sm user-select-none d-inline-block"
                                    style="width: auto;">
                                    <option value="0.5">0.5x</option>
                                    <option value="0.75">0.75x</option>
                                    <option value="1" selected>1.0x</option>
                                    <option value="1.25">1.25x</option>
                                    <option value="1.5">1.5x</option>
                                    <option value="1.75">1.75x</option>
                                    <option value="2">2.0x</option>
                                </select>
                            </div>

                            <div class="time-seek-container d-flex align-items-center gap-3">
                                <input type="number" id="seekHour" min="0" placeholder="時"
                                    style="width: 60px; text-align: center;">
                                <span>:</span>
                                <input type="number" id="seekMinute" min="0" max="59" placeholder="分"
                                    style="width: 60px; text-align: center;">
                                <span>:</span>
                                <input type="number" id="seekSecond" min="0" max="59" placeholder="秒"
                                    style="width: 60px; text-align: center;">
                            </div>

                            <!-- 右側控制區：放聲音按鈕與當前時間 -->
                            <div class="d-flex align-items-center gap-2">
                                <!-- 如果你有音量滑桿，也可以直接塞在靜音按鈕前面或後面 -->
                                <div class="d-inline-flex align-items-center">
                                    <button id="muteBtn" class="btn btn-sm btn-outline-secondary border-0"
                                        type="button">
                                        <i class="bi bi-volume-up-fill"></i>
                                    </button>

                                    <input type="range" class="form-range" id="volumeSlider" min="0" max="100"
                                        value="100" style="width: 80px; height: 6px; cursor: pointer;">
                                </div>
                                <!-- 時間移到這裡，與右邊對齊 -->
                                <div id="currentTime" class="text-muted small fw-bold">00:00:00 / 00:00:00</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- ===================== -->
            <!-- Playlist UI（新增重點） -->
            <!-- ===================== -->
            <div class="col-lg-4">
                <!-- 1. 標題與控制按鈕 -->
                <div id="videoTitle" class="mb-2 fw-bold fs-6 text-truncate"></div>
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <button class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-2" type="button"
                        data-bs-toggle="collapse" data-bs-target="#playlistCollapse" aria-expanded="false"
                        aria-controls="playlistCollapse" id="togglePlaylistBtn">

                        <!-- 🟢 這樣寫就不會 block 斷行，字體也會跟按鈕一起完美置中 -->
                        <span class="btn-text fw-bold">
                            收合清單 <span id="playlist" class="ms-1"></span>
                        </span>

                        <i class="bi bi-chevron-down toggle-arrow rotate-180"></i>
                    </button>
                </div>
                <div class="collapse" id="playlistCollapse">
                    <div class="border rounded p-2" style="max-height: 500px; overflow-y: auto;">
                        <!-- ⭐ 這個是你 JS render 用的 -->
                        <div id="playlistList"></div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- 主程式 -->
    <!-- 不能加 defer -->
    <script src="main_231.js" async></script>
</body>

</html>
