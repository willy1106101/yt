<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="utf-8" />
    <meta name="author" content="Willy Hsu">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Player</title>

    <meta name="description" content="一個簡單的 YouTube 播放器，支援播放列表和基本控制功能。">

    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="./manifest.json">

    <!-- jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="main.css">
</head>

<body>

<div class="container py-3">

    <!-- ===================== -->
    <!-- 輸入區 -->
    <!-- ===================== -->
    <div class="input-group mb-3">
        <input type="text" class="form-control" placeholder="貼上 YouTube 影片網址..." id="videoUrl">

        <button class="btn btn-primary" type="button" id="playBtn">
            <i class="bi bi-play-fill"></i> 播放
        </button>

        <button class="btn btn-outline-secondary" type="button" id="playDefaultBtn">
            預設影片
        </button>
    </div>

    <!-- ===================== -->
    <!-- 主體區（播放器 + playlist） -->
    <!-- ===================== -->
    <div class="row">

        <!-- 播放器 -->
        <div class="col-lg-8">

            <div id="player-wrapper" class="mb-3">
                <div id="player"></div>
            </div>

            <div class="main-card p-3 border rounded">

                <div class="controls-area mb-3 d-flex gap-2">
                    <select id="speedSelect">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1.0x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="1.75">1.75x</option>
                        <option value="2">2.0x</option>
                    </select>
                    <button class="btn btn-secondary" id="prevBtn">
                        <i class="bi bi-skip-start-fill"></i>
                    </button>

                    <button class="btn btn-secondary" id="playPauseBtn">
                        <i class="bi bi-play-fill"></i>
                    </button>

                    <button class="btn btn-secondary" id="nextBtn">
                        <i class="bi bi-skip-end-fill"></i>
                    </button>
                    <button class="btn btn-secondary" id="muteBtn"><i class="bi bi-volume-up-fill"></i></button>
                </div>

                <!-- 播放資訊 -->
                <div class="info-bar">
                    <div class="fw-bold mb-1">播放資訊</div>

                    <div id="videoTitle" class="mb-1"></div>
                    <div id="currentTime" class="text-muted small"></div>
                </div>

            </div>

        </div>

        <!-- ===================== -->
        <!-- Playlist UI（新增重點） -->
        <!-- ===================== -->
        <div class="col-lg-4">

            <div class="border rounded p-2" style="max-height: 600px; overflow-y: auto;">

                <div class="fw-bold mb-2">
                    Playlist <span id="playlist"></span>
                </div>

                <!-- ⭐ 這個是你 JS render 用的 -->
                <div id="playlistList"></div>

            </div>

        </div>

    </div>

</div>

<!-- 主程式 -->
<script src="main_213.js"></script>

</body>

</html>
